name: Build Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install setuptools for node-gyp
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Package Windows exe
        run: pnpm exec electron-builder --win --publish never

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: win-v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Windows v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Windows build from commit ${{ github.sha }}

            Built on `main` push — run #${{ github.run_number }}
          draft: false
          prerelease: true
          files: |
            dist/*.exe
            dist/*.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
