name: Check Brew Version

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: macos-latest
    steps:
      - name: Brew version
        run: brew --version
      - name: Update official Homebrew cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_PAT }}
        run: |
          brew update
          brew bump-cask-pr --version=1.0.102 --no-browse hive-app
