type TicketProviderInfo {
  id: String!
  name: String!
  icon: String!
}

type SettingsFieldInfo {
  key: String!
  label: String!
  type: String!
  required: Boolean!
  placeholder: String
}

type RemoteIssue {
  externalId: String!
  title: String!
  body: String
  state: String!
  url: String!
  createdAt: String!
  updatedAt: String!
}

type RemoteIssueListResult {
  issues: [RemoteIssue!]!
  hasNextPage: Boolean!
  totalCount: Int!
}

type RemoteStatus {
  id: String!
  label: String!
}

type AuthResult {
  success: Boolean!
  error: String
}

type DetectRepoResult {
  repo: String
}

type ImportResult {
  imported: [String!]!
  skipped: [String!]!
}

input ListIssuesInput {
  providerId: String!
  repo: String!
  page: Int!
  perPage: Int!
  state: String!
  search: String
}

input ImportIssueInput {
  externalId: String!
  title: String!
  body: String
  state: String!
  url: String!
}

input ImportIssuesInput {
  providerId: String!
  projectId: String!
  repo: String!
  issues: [ImportIssueInput!]!
}

input UpdateRemoteStatusInput {
  providerId: String!
  repo: String!
  externalId: String!
  statusId: String!
}
